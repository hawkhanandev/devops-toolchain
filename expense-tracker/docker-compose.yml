services:
  mongo:
    image: mongo:7
    container_name: expense-mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: ./server
      dockerfile: dockerfile
    container_name: expense-server
    environment:
      MONGO_URI: mongodb://mongo:27017/expense-tracker
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      dockerfile: dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: expense-client
    ports:
      - "3000:80"
    depends_on:
      - server

  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: jenkins
    user: root
    privileged: true
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/login >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 45s

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-logs:/opt/sonarqube/logs
      - sonarqube-extensions:/opt/sonarqube/extensions
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/api/system/status | grep -q 'UP' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s

volumes:
  mongo-data:
  jenkins-data:
  sonarqube-data:
  sonarqube-logs:
  sonarqube-extensions: