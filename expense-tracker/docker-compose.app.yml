services:
  mongo:
    image: mongo:7
    container_name: expense-mongo
    restart: unless-stopped
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  server:
    build:
      context: ./server
      dockerfile: dockerfile
    container_name: expense-server
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongo:27017/expense-tracker
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/api/health').then(res => res.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  client:
    build:
      context: ./client
      dockerfile: dockerfile
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: expense-client
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  mongo-data:
